<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Registre abastecimentos, consumo, despesas e lembretes do seu carro. Offline-first, com IA pra extrair dados do cupom em segundos.">
  <meta name="theme-color" content="#0E1F1A">

  <!-- iOS PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AutoLog">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph (preview ao compartilhar URL) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="AutoLog — Carro sob controle">
  <meta property="og:description" content="Abastecimentos, consumo, despesas e lembretes do seu carro. Offline-first.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AutoLog</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- AutoLog PWA — service worker próprio (offline-first manual).
       O flutter_service_worker.js gerado virou stub (deprecated nos
       releases recentes do Flutter). Ver web/sw.js. -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(
          function (reg) {
            console.log('[autolog-sw] registered, scope:', reg.scope);
          },
          function (err) {
            console.warn('[autolog-sw] registration failed:', err);
          }
        );
      });
    }
  </script>
</body>
</html>
