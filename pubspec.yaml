name: autolog
description: "AutoLog - Registro inteligente de abastecimentos e despesas veiculares."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Local database
  drift: ^2.27.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  path: ^1.9.1

  # Backend
  supabase_flutter: ^2.9.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  decimal: ^3.2.1

  # Routing
  go_router: ^15.1.2

  # Charts
  fl_chart: ^0.70.2

  # HTTP client — FIPE API
  http: ^1.2.0

  # Image
  image_picker: ^1.1.2

  # File picker (CRLV PDF/imagem)
  file_picker: ^8.0.0

  # ML Kit OCR (mobile only) — REMOVIDO temporariamente: não suporta arm64
  # no simulador iOS (Apple Silicon). Re-adicionar no Sprint 3.4 e testar o
  # OCR de odômetro em device físico. Ver docs/BACKLOG.md §3.4.
  # google_mlkit_text_recognition: ^0.14.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Home widget (iOS WidgetKit / Android AppWidget bridge)
  home_widget: ^0.7.0

  # TTS — leitura de insights, recap e lembretes fiscais em PT-BR.
  flutter_tts: ^4.2.0

  # Design system — tipografia (Bricolage Grotesque display + Manrope body).
  # Justificativa: identidade visual distinta vs. fonte do sistema. Carrega
  # sob demanda e faz cache local; impacto runtime irrisório no primeiro start.
  google_fonts: ^6.2.1

  # Export — CSV Backup (Sprint 6.II).
  share_plus: ^10.0.0

  # Export — PDF Histórico do Veículo (Sprint 6.Y).
  pdf: ^3.11.1
  printing: ^5.13.4

  # Onboarding state (Sprint 6.GG fix) — pré-login, independente de userId.
  shared_preferences: ^2.3.0

  # Google Calendar integration (Sprint 6.EE).
  # Mock é o default até o OAuth estar configurado (docs/google-calendar-setup.md).
  google_sign_in: ^7.0.0
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0

  # Apple Sign In (Sprint 6.LL) — iOS 13+, Android sempre retorna isAvailable=false.
  # Web: suportado via redirect, implementado na Sprint 8 (2ª onda).
  sign_in_with_apple: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  freezed: ^3.0.6
  json_serializable: ^6.9.4
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  drift_dev: ^2.27.0

  # Branding
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

# ---------------------------------------------------------------------------
# Splash screen — cor sólida brand já funciona sem asset.
# Adicionar `image:` quando o logo final estiver em assets/branding/.
# ---------------------------------------------------------------------------
flutter_native_splash:
  color: "#0E1F1A"
  color_dark: "#0E1F1A"
  # image: assets/branding/splash_logo.png        # TODO: descomentar quando tiver asset
  ios: true
  android: true
  web: false
  android_12:
    color: "#0E1F1A"
    # image: assets/branding/splash_logo_android12.png  # TODO: descomentar quando tiver asset

# ---------------------------------------------------------------------------
# Launcher icon — aguardando PNGs em assets/branding/.
# NÃO rodar `dart run flutter_launcher_icons` ainda (vai falhar sem os PNGs).
# Ver docs/branding-setup.md para instruções de geração dos assets.
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/app_icon.png"
  adaptive_icon_background: "#0E1F1A"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground.png"
  remove_alpha_ios: true
  min_sdk_android: 21
